<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; }
        .tt-red { background-color: #FE2C55; }
        .tt-red-text { color: #FE2C55; }
        /* Flat UI - No Blurs */
        .modal-overlay { background: rgba(0,0,0,0.6); display: none; position: fixed; inset: 0; z-index: 50; align-items: flex-end; }
        .bottom-sheet { background: white; width: 100%; border-radius: 16px 16px 0 0; padding: 20px; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .coin-btn { border: 1px solid #f1f1f2; transition: all 0.1s; background: #f8f8f8; }
        .coin-btn:active { border-color: #FE2C55; background: #fff1f3; }
        .tab-active { border-bottom: 2px solid #000; font-weight: 700; }
    </style>
</head>
<body class="flex justify-center">

    <div class="w-full max-w-md min-h-screen flex flex-col">
        <header class="px-4 py-4 flex items-center border-b border-gray-100">
            <button class="mr-4">
                <svg width="24" height="24" viewBox="0 0 48 48" fill="none"><path d="M31 36L19 24L31 12" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <h1 class="text-[17px] font-bold flex-grow text-center pr-8">Balance</h1>
        </header>

        <div class="p-6 text-center border-b border-gray-50">
            <p class="text-gray-500 text-sm mb-1">Total Balance</p>
            <div class="flex justify-center items-center gap-2">
                <img src="https://p16-va.lemon8cdn.com/tos-alisg-i-9378129883/6f7f6f8f7f6f4f8f9f8f4f8f7f6f4f8f~tplv-tej9nj120t-origin.webp" class="w-6 h-6">
                <span id="currentBalance" class="text-4xl font-extrabold">1,240</span>
            </div>
        </div>

        <div class="flex border-b">
            <button onclick="switchTab('recharge')" id="tab-recharge" class="flex-1 py-3 text-sm tab-active">Recharge</button>
            <button onclick="switchTab('send')" id="tab-send" class="flex-1 py-3 text-sm text-gray-400">Send Coins</button>
        </div>

        <div id="recharge-content" class="p-4 flex-grow">
            <p class="text-[12px] text-gray-400 font-bold mb-4 uppercase tracking-widest">Select Package</p>
            <div class="grid grid-cols-3 gap-3">
                <div onclick="recharge(30, 0.31)" class="coin-btn rounded-lg p-4 flex flex-col items-center cursor-pointer">
                    <span class="text-[16px] font-bold">30</span>
                    <span class="text-gray-500 text-[12px]">$0.31</span>
                </div>
                <div onclick="recharge(350, 3.65)" class="coin-btn rounded-lg p-4 flex flex-col items-center cursor-pointer">
                    <span class="text-[16px] font-bold">350</span>
                    <span class="text-gray-500 text-[12px]">$3.65</span>
                </div>
                <div onclick="openCustom()" class="coin-btn rounded-lg p-4 flex flex-col items-center justify-center cursor-pointer text-gray-600 font-medium">Custom</div>
            </div>
        </div>

        <div id="send-content" class="p-4 hidden flex-grow">
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">Recipient</label>
                    <input id="sendUser" type="text" placeholder="@username" class="w-full bg-gray-100 p-4 rounded-xl mt-1 outline-none border focus:border-black">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">Amount to Send</label>
                    <div class="relative mt-1">
                        <img src="https://p16-va.lemon8cdn.com/tos-alisg-i-9378129883/6f7f6f8f7f6f4f8f9f8f4f8f7f6f4f8f~tplv-tej9nj120t-origin.webp" class="absolute left-4 top-4 w-5 h-5">
                        <input id="sendAmt" type="number" placeholder="0" class="w-full bg-gray-100 p-4 pl-12 rounded-xl outline-none border focus:border-black font-bold">
                    </div>
                </div>
                <button onclick="handleSend()" class="w-full tt-red text-white py-4 rounded-xl font-bold text-lg active:scale-[0.98] transition-transform">Send Coins</button>
            </div>
        </div>

        <div id="customSheet" class="modal-overlay" onclick="closeSheet('customSheet')">
            <div class="bottom-sheet" onclick="event.stopPropagation()">
                <div class="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-6"></div>
                <h3 class="text-lg font-bold mb-4">Custom Recharge</h3>
                <input id="customInput" type="number" placeholder="Min 30 coins" class="w-full border-2 border-gray-100 p-4 rounded-xl outline-none focus:border-[#FE2C55] mb-4 font-bold">
                <button onclick="recharge(document.getElementById('customInput').value, 0)" class="w-full tt-red text-white py-4 rounded-xl font-bold">Confirm</button>
            </div>
        </div>

        <div id="msgSheet" class="modal-overlay">
            <div class="bottom-sheet text-center pb-12">
                <div id="spinner" class="py-10">
                    <div class="animate-spin h-10 w-10 border-4 border-[#FE2C55] border-t-transparent rounded-full mx-auto"></div>
                    <p class="mt-4 font-medium text-gray-500">Processing transaction...</p>
                </div>
                <div id="successMsg" class="hidden py-6">
                    <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <h3 class="text-xl font-bold" id="statusTitle">Transfer Complete</h3>
                    <p class="text-gray-500 mt-2" id="statusDesc"></p>
                    <button onclick="location.reload()" class="mt-8 w-full bg-black text-white py-4 rounded-xl font-bold">Back to Wallet</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let balance = 1240;

        function switchTab(tab) {
            const rCont = document.getElementById('recharge-content');
            const sCont = document.getElementById('send-content');
            const rTab = document.getElementById('tab-recharge');
            const sTab = document.getElementById('tab-send');

            if(tab === 'recharge') {
                rCont.classList.remove('hidden'); sCont.classList.add('hidden');
                rTab.className = "flex-1 py-3 text-sm tab-active";
                sTab.className = "flex-1 py-3 text-sm text-gray-400";
            } else {
                rCont.classList.add('hidden'); sCont.classList.remove('hidden');
                sTab.className = "flex-1 py-3 text-sm tab-active";
                rTab.className = "flex-1 py-3 text-sm text-gray-400";
            }
        }

        function openCustom() { document.getElementById('customSheet').style.display = 'flex'; }
        function closeSheet(id) { document.getElementById(id).style.display = 'none'; }

        function recharge(amt, price) {
            if(amt < 30) return alert("Min 30 coins");
            closeSheet('customSheet');
            showStatus("Recharge Successful", `You added ${amt} coins to your balance.`);
            balance += parseInt(amt);
            updateUI();
        }

        function handleSend() {
            const user = document.getElementById('sendUser').value;
            const amt = document.getElementById('sendAmt').value;
            if(!user || amt <= 0) return alert("Fill in username and amount");
            if(amt > balance) return alert("Insufficient balance");

            showStatus("Coins Sent", `Successfully sent ${amt} coins to ${user}`);
            balance -= parseInt(amt);
            updateUI();
        }

        function showStatus(title, desc) {
            document.getElementById('msgSheet').style.display = 'flex';
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('successMsg').classList.add('hidden');

            setTimeout(() => {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('successMsg').classList.remove('hidden');
                document.getElementById('statusTitle').innerText = title;
                document.getElementById('statusDesc').innerText = desc;
            }, 2000);
        }

        function updateUI() {
            document.getElementById('currentBalance').innerText = balance.toLocaleString();
        }
    </script>
</body>
</html>
