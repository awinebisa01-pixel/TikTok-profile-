<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok - Get Coins</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; }
        .tt-red { background-color: #FE2C55; }
        .tt-red-text { color: #FE2C55; }
        
        /* Modern Input Styling */
        .tt-input-container { background-color: #F1F1F2; transition: 0.1s; border: 1.5px solid transparent; }
        .tt-input-container:focus-within { background-color: #ffffff; border-color: #c9cbcd; }

        /* Package Card Styling */
        .pkg-card { background-color: #ffffff; border: 1.5px solid #F1F1F2; transition: 0.1s; cursor: pointer; }
        .pkg-card:active { border-color: #FE2C55; background-color: #fff1f3; transform: scale(0.97); }
        
        /* Coin Icons - Replaced placeholder with graphic */
        .coin-icon { width: 18px; height: 18px; margin-right: 2px; }

        /* Modern Modal (Bottom Sheet, No Blur) */
        .modal-overlay { background: rgba(0,0,0,0.6); display: none; position: fixed; inset: 0; z-index: 50; align-items: flex-end; }
        .bottom-sheet { background: white; width: 100%; border-radius: 16px 16px 0 0; padding: 24px; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="flex justify-center">

    <div class="w-full max-w-md min-h-screen flex flex-col relative pb-32">
        <header class="p-4 flex items-center justify-between border-b border-gray-100 bg-white sticky top-0 z-10">
            <div class="flex items-center">
                <button class="mr-3">
                    <svg width="24" height="24" viewBox="0 0 48 48" fill="none"><path d="M31 36L19 24L31 12" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <h1 class="text-[17px] font-bold">Get Coins</h1>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-xl font-bold">...</span>
                <div class="w-9 h-9 rounded-full border-2 border-gray-100 overflow-hidden bg-gray-50">
                    <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=Felix" alt="user avatar">
                </div>
            </div>
        </header>

        <div class="p-5 flex-grow">
            <div class="tt-input-container flex items-center rounded-xl px-4 py-2.5 mb-5">
                <img src="https://sf16-scmcdn-va.ibytedtos.com/goofy/tiktok/web/node/_next/static/images/logo-dark-e95da58a793c313f5d909927cf4c7c3b.svg" class="w-5 h-5 mr-3">
                <input type="text" placeholder="Enter username" class="bg-transparent w-full outline-none text-[15px] font-medium placeholder:text-gray-400">
            </div>

            <div class="mb-5 p-1">
                <p class="tt-red-text text-[13px] font-semibold flex items-center gap-1.5 leading-tight">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                    Save around 25% with a lower third-party service fee.
                </p>
            </div>

            <p class="text-gray-400 text-[12px] font-bold uppercase mb-4 tracking-wider">Recharge</p>

            <div class="grid grid-cols-3 gap-3.5 mb-8">
                <div onclick="recharge(30, 0.31, this)" class="pkg-card rounded-xl p-4 flex flex-col items-center">
                    <div class="flex items-center gap-1.5 mb-1">
                        <img src="https://p16-va.lemon8cdn.com/tos-alisg-i-9378129883/6f7f6f8f7f6f4f8f9f8f4f8f7f6f4f8f~tplv-tej9nj120t-origin.webp" class="coin-icon">
                        <span class="text-[16px] font-bold">30</span>
                    </div>
                    <div class="text-gray-500 text-[12px] font-medium">$0.31</div>
                </div>
                <div onclick="recharge(350, 3.65, this)" class="pkg-card rounded-xl p-4 flex flex-col items-center">
                    <div class="flex items-center gap-1.5 mb-1">
                        <img src="https://p16-va.lemon8cdn.com/tos-alisg-i-9378129883/6f7f6f8f7f6f4f8f9f8f4f8f7f6f4f8f~tplv-tej9nj120t-origin.webp" class="coin-icon">
                        <span class="text-[16px] font-bold">350</span>
                    </div>
                    <div class="text-gray-500 text-[12px] font-medium">$3.65</div>
                </div>
                <div onclick="recharge(700, 7.25, this)" class="pkg-card rounded-xl p-4 flex flex-col items-center">
                    <div class="flex items-center gap-1.5 mb-1">
                        <img src="https://p16-va.lemon8cdn.com/tos-alisg-i-9378129883/6f7f6f8f7f6f4f8f9f8f4f8f7f6f4f8f~tplv-tej9nj120t-origin.webp" class="coin-icon">
                        <span class="text-[16px] font-bold">700</span>
                    </div>
                    <div class="text-gray-500 text-[12px] font-medium">$7.25</div>
                </div>
                <div onclick="openCustom()" class="pkg-card rounded-xl p-4 flex items-center justify-center text-gray-700 font-bold">Custom</div>
            </div>

            <div class="bg-gray-50 rounded-xl p-5 flex justify-between items-center mb-5 cursor-pointer">
                <div>
                    <h4 class="font-bold text-[14px]">Invite & Get Rewards 🎁</h4>
                    <p class="text-[12px] text-gray-500">Check out this new feature!</p>
                </div>
                <span class="text-gray-300">❯</span>
            </div>
        </div>

        <footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-100 p-5 pb-9 shadow-[0_-4px_12px_rgba(0,0,0,0.03)] z-10">
            <div class="flex justify-center gap-4 mb-4 grayscale opacity-40">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" class="h-3.5">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" class="h-4.5">
            </div>
            <button onclick="openStatus()" id="buyBtn" class="tt-red w-full text-white text-[16px] font-bold py-3.5 rounded-xl active:scale-[0.98] transition-all">
                Buy for $0.00
            </button>
        </footer>
    </div>

    <div id="customModal" class="modal-overlay" onclick="closeModal()">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>
            <h3 class="text-center font-bold text-lg mb-6">Custom Amount ✏️</h3>
            <div class="relative mb-6">
                <img src="https://p16-va.lemon8cdn.com/tos-alisg-i-9378129883/6f7f6f8f7f6f4f8f9f8f4f8f7f6f4f8f~tplv-tej9nj120t-origin.webp" class="absolute left-4 top-4.5 w-6 h-6">
                <input id="customInput" type="number" placeholder="Enter amount (min 30)" class="w-full bg-[#f1f1f2] p-5 pl-14 rounded-xl outline-none text-[17px] font-extrabold border-2 border-transparent focus:border-[#FE2C55]">
            </div>
            <button onclick="processCustom()" class="w-full tt-red text-white py-4 rounded-xl font-bold text-lg active:scale-[0.98]">Continue</button>
        </div>
    </div>

    <div id="processingModal" class="modal-overlay justify-center items-center p-6">
        <div class="bg-white rounded-2xl w-full max-w-xs p-8 text-center shadow-2xl">
            <div id="loader" class="py-10">
                <div class="animate-spin h-10 w-10 border-4 border-[#FE2C55] border-t-transparent rounded-full mx-auto"></div>
                <p class="mt-4 font-medium text-gray-500">Processing Payment... ⏳</p>
            </div>
            <div id="paymentDetails" class="hidden text-left space-y-3 pt-4 border-t border-gray-100">
                <div class="flex justify-between"><span class="text-gray-500">Status</span><span class="font-bold text-green-600">Successful ✅</span></div>
                <div class="flex justify-between"><span class="text-gray-500">Order ID</span><span class="font-mono text-sm">#TT-88201</span></div>
                <div class="flex justify-between"><span class="text-gray-500">Total Coins</span><span id="finalCoins" class="font-extrabold text-[#FE2C55]">0</span></div>
                <button onclick="location.reload()" class="w-full bg-black text-white py-3.5 mt-5 rounded-xl font-bold">Done</button>
            </div>
        </div>
    </div>

    <script>
        function openCustom() { document.getElementById('customModal').style.display = 'flex'; }
        function closeModal() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

        function recharge(amt, price, el) {
            document.querySelectorAll('.pkg-card').forEach(c => c.style.borderColor = '#F1F1F2');
            el.style.borderColor = '#FE2C55';
            document.getElementById('buyBtn').innerText = `Buy for $${price}`;
            document.getElementById('finalCoins').innerText = amt;
        }

        function processCustom() {
            const amt = document.getElementById('customInput').value;
            if(amt < 30) return alert("Minimum 30 coins required.");
            
            closeModal();
            openStatus();
            document.getElementById('finalCoins').innerText = amt;
        }

        function openStatus() {
            document.getElementById('processingModal').style.display = 'flex';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('paymentDetails').classList.add('hidden');
            
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('paymentDetails').classList.remove('hidden');
            }, 2500);
        }
    </script>
</body>
</html>
