<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Coins - Payment Success</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Animations */
        @keyframes pulse-red { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } }
        @keyframes pulse-teal { 0%, 100% { transform: scale(1.2); opacity: 0.7; } 50% { transform: scale(1); opacity: 1; } }
        .dot-red { animation: pulse-red 1s infinite ease-in-out; }
        .dot-teal { animation: pulse-teal 1s infinite ease-in-out; }
        
        @keyframes scale-up { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .animate-success { animation: scale-up 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="bg-[#F8F8F8]">

    <div id="root" class="max-w-md mx-auto min-h-screen relative overflow-hidden">
        <header class="flex items-center justify-between p-4 bg-white border-b border-gray-100">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" class="rotate-180"><path d="m9 18 6-6-6-6"/></svg>
            <h1 class="text-[17px] font-extrabold">Get Coins</h1>
            <div class="w-10"></div>
        </header>

        <main class="p-4 space-y-4">
            <div class="bg-white rounded-2xl p-4 flex items-center gap-4 shadow-sm border border-gray-100/50">
                <div class="w-[42px] h-[42px] bg-black rounded-full flex items-center justify-center">
                    <svg viewBox="0 0 24 24" class="w-6 h-6 fill-white"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.59-.98v7.37c0 1.12-.22 2.21-.66 3.21-.43 1.01-1.07 1.88-1.91 2.52a6.974 6.974 0 0 1-5.11 1.33c-1.04-.13-2.03-.51-2.91-1.11a6.83 6.83 0 0 1-2.28-2.85 7.15 7.15 0 0 1-.36-5.02c.26-1.05.74-2.02 1.43-2.84a6.76 6.76 0 0 1 3.51-2.11c.15-.03.3-.06.45-.08v4.07c-.06.01-.12.02-.19.03-.43.08-.85.24-1.23.47a3.02 3.02 0 0 0-1.08 1.18 3.12 3.12 0 0 0-.05 2.51c.19.46.51.86.91 1.14.4.28.88.44 1.37.47.67.04 1.34-.14 1.9-.52.56-.37.95-.94 1.08-1.59.05-.24.08-.49.08-.74V.02h.01z"/></svg>
                </div>
                <div><p class="font-bold">lorayne4_</p></div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div onclick="startProcessing()" class="bg-white h-20 rounded-xl flex flex-col items-center justify-center border border-red-200 bg-red-50 ring-1 ring-red-400">
                    <span class="font-extrabold text-lg">700</span>
                    <span class="text-xs text-gray-400">$7.40</span>
                </div>
            </div>
        </main>

        <div class="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-100 p-4 z-10">
            <button onclick="startProcessing()" class="w-full h-[52px] bg-[#FE2C55] text-white rounded-md font-extrabold text-[16px] flex items-center justify-center gap-2">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Buy for $7.40
            </button>
        </div>

        <div id="modal-overlay" class="fixed inset-0 bg-black/50 z-[100] hidden items-center justify-center p-8 backdrop-blur-[2px]">
            
            <div id="processing-state" class="bg-white w-full max-w-[300px] rounded-[32px] p-10 flex flex-col items-center space-y-6 shadow-2xl">
                <div class="flex gap-2">
                    <div class="w-4 h-4 bg-[#FE2C55] rounded-full dot-red"></div>
                    <div class="w-4 h-4 bg-[#2AF0EA] rounded-full dot-teal"></div>
                </div>
                <div class="text-center">
                    <h3 class="text-[18px] font-bold text-[#161823]">Processing your payment</h3>
                    <p class="text-[13px] text-gray-400 mt-2">This could take a few seconds</p>
                </div>
                <div class="text-[15px] font-bold text-gray-300 pt-2">04:59</div>
            </div>

            <div id="success-state" class="hidden bg-white w-full max-w-[300px] rounded-[32px] p-10 flex flex-col items-center space-y-6 shadow-2xl animate-success">
                <div class="w-16 h-16 bg-[#25C059] rounded-full flex items-center justify-center">
                    <svg viewBox="0 0 24 24" width="32" height="32" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <div class="text-center">
                    <h3 class="text-[20px] font-extrabold text-[#161823]">Payment done</h3>
                    <p class="text-[14px] text-gray-400 mt-2 font-medium">Your recharge was successful!</p>
                </div>
                <button onclick="resetUI()" class="w-full h-[48px] bg-gray-100 text-[#161823] rounded-lg font-bold text-[15px] hover:bg-gray-200 transition-colors">
                    Done
                </button>
            </div>

        </div>
    </div>

    <script>
        function startProcessing() {
            const overlay = document.getElementById('modal-overlay');
            const procState = document.getElementById('processing-state');
            const succState = document.getElementById('success-state');

            // Show Overlay & Processing
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            procState.classList.remove('hidden');
            succState.classList.add('hidden');

            // Wait 3 seconds, then switch to Success
            setTimeout(() => {
                procState.classList.add('hidden');
                succState.classList.remove('hidden');
                succState.classList.add('flex');
            }, 3000);
        }

        function resetUI() {
            const overlay = document.getElementById('modal-overlay');
            overlay.classList.add('hidden');
            overlay.classList.remove('flex');
        }
    </script>
</body>
</html>
