<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Coins - Recharge Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .coin-shadow { box-shadow: 0 0 0 1px rgba(251, 210, 60, 1); }
        .selected-card { border-color: #FBC7C7; background-color: #FFF2F2; ring: 1px solid #FE2C55; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Modal Transitions */
        #custom-modal { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); }
        #custom-modal.show { transform: translateY(0%); }

        /* Processing Dots */
        @keyframes pulse-red { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } }
        @keyframes pulse-teal { 0%, 100% { transform: scale(1.2); opacity: 0.7; } 50% { transform: scale(1); opacity: 1; } }
        .dot-red { animation: pulse-red 1s infinite ease-in-out; }
        .dot-teal { animation: pulse-teal 1s infinite ease-in-out; }
        
        @keyframes pop-in { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="bg-[#F8F8F8] no-scrollbar overflow-x-hidden">

    <div id="root" class="max-w-md mx-auto min-h-screen pb-40 relative">
        <header class="flex items-center justify-between p-4 bg-white sticky top-0 z-20 border-b border-gray-100/50">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="rotate-180 text-[#161823]"><path d="m9 18 6-6-6-6"/></svg>
            <h1 class="text-[17px] font-extrabold text-[#161823]">Get Coins</h1>
            <div class="flex gap-4 items-center">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
        </header>

        <main class="p-4 space-y-4">
            <div class="bg-white rounded-2xl p-4 flex items-center gap-4 shadow-sm border border-gray-100/50">
                <div class="w-[42px] h-[42px] bg-black rounded-full flex items-center justify-center overflow-hidden">
                    <svg viewBox="0 0 24 24" class="w-6 h-6 fill-white"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.59-.98v7.37c0 1.12-.22 2.21-.66 3.21-.43 1.01-1.07 1.88-1.91 2.52a6.974 6.974 0 0 1-5.11 1.33c-1.04-.13-2.03-.51-2.91-1.11a6.83 6.83 0 0 1-2.28-2.85 7.15 7.15 0 0 1-.36-5.02c.26-1.05.74-2.02 1.43-2.84a6.76 6.76 0 0 1 3.51-2.11c.15-.03.3-.06.45-.08v4.07c-.06.01-.12.02-.19.03-.43.08-.85.24-1.23.47a3.02 3.02 0 0 0-1.08 1.18 3.12 3.12 0 0 0-.05 2.51c.19.46.51.86.91 1.14.4.28.88.44 1.37.47.67.04 1.34-.14 1.9-.52.56-.37.95-.94 1.08-1.59.05-.24.08-.49.08-.74V.02h.01z"/></svg>
                </div>
                <input type="text" placeholder="Enter username" class="flex-1 outline-none text-[16px] font-medium text-[#161823]">
            </div>

            <div class="space-y-3">
                <h2 class="text-[15px] font-bold text-[#575B67]">Recharge</h2>
                <div class="grid grid-cols-3 gap-2">
                    <div onclick="select(this, 0.31)" class="coin-card bg-white h-[80px] rounded-xl flex flex-col items-center justify-center border-2 border-transparent shadow-sm cursor-pointer">
                        <div class="flex items-center gap-1.5"><div class="w-4 h-4 bg-[#FBD23C] rounded-full coin-shadow"></div><span class="font-extrabold text-[18px]">30</span></div>
                        <span class="text-[13px] text-gray-400">$0.31</span>
                    </div>
                    <div onclick="openCustom()" class="coin-card bg-white h-[80px] rounded-xl flex flex-col items-center justify-center border-2 border-transparent shadow-sm cursor-pointer">
                        <span class="font-extrabold text-[17px] text-[#161823]">Custom</span>
                    </div>
                </div>
            </div>
        </main>

        <div class="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-100 p-4 z-10 shadow-lg">
            <button onclick="triggerProcess()" class="w-full h-[52px] bg-[#FE2C55] text-white rounded-md font-extrabold flex items-center justify-center gap-2">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Buy for <span id="price-display">$0.31</span>
            </button>
        </div>
    </div>

    <div id="modal-overlay" class="fixed inset-0 bg-black/50 z-50 hidden opacity-0 transition-opacity" onclick="closeCustom()"></div>
    <div id="custom-modal" class="fixed bottom-0 w-full max-w-md bg-white rounded-t-[32px] z-50 p-6 space-y-6">
        <div class="flex items-center justify-between">
            <button onclick="closeCustom()" class="font-bold">Cancel</button>
            <h3 class="text-xl font-extrabold">Custom</h3>
            <div class="w-6 h-6 border-2 border-gray-300 rounded-full flex items-center justify-center text-xs text-gray-400 font-bold">?</div>
        </div>

        <div class="space-y-2">
            <p class="text-sm font-bold text-gray-500">Number of Coins</p>
            <div class="bg-gray-100 rounded-xl p-4 flex items-center gap-3">
                <div class="w-8 h-8 bg-black rounded-full flex items-center justify-center">
                    <svg viewBox="0 0 24 24" class="w-4 h-4 fill-white"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.59-.98v7.37c0 1.12-.22 2.21-.66 3.21-.43 1.01-1.07 1.88-1.91 2.52a6.974 6.974 0 0 1-5.11 1.33c-1.04-.13-2.03-.51-2.91-1.11a6.83 6.83 0 0 1-2.28-2.85 7.15 7.15 0 0 1-.36-5.02c.26-1.05.74-2.02 1.43-2.84a6.76 6.76 0 0 1 3.51-2.11c.15-.03.3-.06.45-.08v4.07c-.06.01-.12.02-.19.03-.43.08-.85.24-1.23.47a3.02 3.02 0 0 0-1.08 1.18 3.12 3.12 0 0 0-.05 2.51c.19.46.51.86.91 1.14.4.28.88.44 1.37.47.67.04 1.34-.14 1.9-.52.56-.37.95-.94 1.08-1.59.05-.24.08-.49.08-.74V.02h.01z"/></svg>
                </div>
                <input id="coin-input" type="text" readonly value="0" class="bg-transparent text-2xl font-bold w-full outline-none">
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <button onclick="press(1)" class="h-14 bg-gray-100 rounded-xl text-2xl font-bold">1</button>
            <button onclick="press(2)" class="h-14 bg-gray-100 rounded-xl text-2xl font-bold">2</button>
            <button onclick="press(3)" class="h-14 bg-gray-100 rounded-xl text-2xl font-bold">3</button>
            <button onclick="press(4)" class="h-14 bg-gray-100 rounded-xl text-2xl font-bold">4</button>
            <button onclick="press(5)" class="h-14 bg-gray-100 rounded-xl text-2xl font-bold">5</button>
            <button onclick="press(6)" class="h-14 bg-gray-100 rounded-xl text-2xl font-bold">6</button>
            <button onclick="press(7)" class="h-14 bg-gray-100 rounded-xl text-2xl font-bold">7</button>
            <button onclick="press(8)" class="h-14 bg-gray-100 rounded-xl text-2xl font-bold">8</button>
            <button onclick="press(9)" class="h-14 bg-gray-100 rounded-xl text-2xl font-bold">9</button>
            <div></div><button onclick="press(0)" class="h-14 bg-gray-100 rounded-xl text-2xl font-bold">0</button>
            <button onclick="press('back')" class="h-14 bg-gray-100 rounded-xl flex items-center justify-center font-bold">←</button>
        </div>

        <div class="pt-4 border-t border-gray-100 flex justify-between items-center">
            <span class="text-gray-500 font-bold">Total</span>
            <span id="modal-price" class="text-2xl font-extrabold">$0.00</span>
        </div>
        <button onclick="triggerProcess()" class="w-full h-[52px] bg-[#FE2C55] text-white rounded-md font-extrabold">Recharge</button>
    </div>

    <div id="full-overlay" class="fixed inset-0 bg-black/40 z-[100] hidden items-center justify-center p-8 backdrop-blur-sm">
        <div id="proc-box" class="bg-white w-full max-w-[280px] rounded-[32px] p-8 flex flex-col items-center space-y-6 shadow-2xl">
            <div class="flex gap-2">
                <div class="w-4 h-4 bg-[#FE2C55] rounded-full dot-red"></div>
                <div class="w-4 h-4 bg-[#2AF0EA] rounded-full dot-teal"></div>
            </div>
            <div class="text-center"><h3 class="font-bold text-lg">Processing your payment</h3><p class="text-xs text-gray-400 mt-1">This could take a few seconds</p></div>
            <div class="text-gray-300 font-bold">04:59</div>
        </div>

        <div id="success-box" class="hidden bg-white w-full max-w-[280px] rounded-[32px] p-8 flex flex-col items-center space-y-6 shadow-2xl animate-pop">
            <div class="w-16 h-16 bg-[#25C059] rounded-full flex items-center justify-center">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4"><path d="M20 6L9 17l-5-5"/></svg>
            </div>
            <h3 class="text-xl font-extrabold">Payment done</h3>
            <button onclick="location.reload()" class="w-full py-3 bg-gray-100 rounded-xl font-bold">Done</button>
        </div>
    </div>

    <script>
        let currentCoins = "0";
        function select(el, p) {
            document.querySelectorAll('.coin-card').forEach(c => c.classList.remove('selected-card'));
            el.classList.add('selected-card');
            document.getElementById('price-display').innerText = '$' + p;
        }

        function openCustom() {
            document.getElementById('modal-overlay').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('modal-overlay').classList.add('opacity-100');
                document.getElementById('custom-modal').classList.add('show');
            }, 10);
        }

        function closeCustom() {
            document.getElementById('custom-modal').classList.remove('show');
            document.getElementById('modal-overlay').classList.remove('opacity-100');
            setTimeout(() => document.getElementById('modal-overlay').classList.add('hidden'), 300);
        }

        function press(k) {
            if (k === 'back') {
                currentCoins = currentCoins.length > 1 ? currentCoins.slice(0, -1) : "0";
            } else {
                currentCoins = currentCoins === "0" ? String(k) : currentCoins + k;
            }
            document.getElementById('coin-input').value = currentCoins;
            let price = (parseInt(currentCoins) * 0.0106).toFixed(2);
            document.getElementById('modal-price').innerText = '$' + price;
            document.getElementById('price-display').innerText = '$' + price;
        }

        function triggerProcess() {
            closeCustom();
            const overlay = document.getElementById('full-overlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            
            setTimeout(() => {
                document.getElementById('proc-box').classList.add('hidden');
                document.getElementById('success-box').classList.remove('hidden');
            }, 3000);
        }
    </script>
</body>
</html>
