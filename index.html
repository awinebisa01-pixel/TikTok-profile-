<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Coins - Custom Recharge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .coin-shadow { box-shadow: 0 0 0 1px rgba(251, 210, 60, 1); }
        .selected-card { border-color: #FBC7C7; background-color: #FFF2F2; ring: 1px solid #FE2C55; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Keypad animation */
        #keypad-modal {
            transition: transform 0.3s ease-out;
            transform: translateY(100%);
        }
        #keypad-modal.show {
            transform: translateY(0%);
        }
    </style>
</head>
<body class="bg-[#F8F8F8] no-scrollbar overflow-hidden">

    <div id="root" class="max-w-md mx-auto min-h-screen pb-40 relative">
        <header class="flex items-center justify-between p-4 bg-white sticky top-0 z-20 border-b border-gray-100/50">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="rotate-180 text-[#161823]"><path d="m9 18 6-6-6-6"/></svg>
            <h1 class="text-[17px] font-extrabold text-[#161823]">Get Coins</h1>
            <div class="flex gap-4 items-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[#161823]"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[#161823]"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
        </header>

        <main class="p-4 space-y-4">
            <div class="bg-white rounded-2xl p-4 flex items-center gap-4 shadow-sm border border-gray-100/50">
                <div class="w-[42px] h-[42px] bg-black rounded-full flex items-center justify-center overflow-hidden">
                    <svg viewBox="0 0 24 24" class="w-6 h-6 fill-white" xmlns="http://www.w3.org/2000/svg"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.59-.98v7.37c0 1.12-.22 2.21-.66 3.21-.43 1.01-1.07 1.88-1.91 2.52a6.974 6.974 0 0 1-5.11 1.33c-1.04-.13-2.03-.51-2.91-1.11a6.83 6.83 0 0 1-2.28-2.85 7.15 7.15 0 0 1-.36-5.02c.26-1.05.74-2.02 1.43-2.84a6.76 6.76 0 0 1 3.51-2.11c.15-.03.3-.06.45-.08v4.07c-.06.01-.12.02-.19.03-.43.08-.85.24-1.23.47a3.02 3.02 0 0 0-1.08 1.18 3.12 3.12 0 0 0-.05 2.51c.19.46.51.86.91 1.14.4.28.88.44 1.37.47.67.04 1.34-.14 1.9-.52.56-.37.95-.94 1.08-1.59.05-.24.08-.49.08-.74V.02h.01z"/></svg>
                </div>
                <input type="text" placeholder="Enter username" class="flex-1 outline-none text-[16px] font-medium text-[#161823] placeholder:text-[#A7A9AC]">
            </div>

            <div class="space-y-3">
                <h2 class="text-[15px] font-bold text-[#575B67] ml-1">Recharge</h2>
                <p class="text-[13px] text-[#E64223] font-semibold leading-tight ml-1 flex items-start gap-1">
                    Save around 25% with a lower third-party service fee. 
                    <span class="text-[#86878B] opacity-60">ⓘ</span>
                </p>
                
                <div class="grid grid-cols-3 gap-2">
                    <div onclick="select(this, 0.31, 30)" class="coin-card bg-white h-[80px] rounded-xl flex flex-col items-center justify-center border-2 border-transparent shadow-sm cursor-pointer transition-all">
                        <div class="flex items-center gap-1.5">
                            <div class="w-4 h-4 bg-[#FBD23C] rounded-full flex items-center justify-center coin-shadow">
                                <span class="text-white font-bold text-[9px]">d</span>
                            </div>
                            <span class="font-extrabold text-[18px]">30</span>
                        </div>
                        <span class="text-[13px] text-[#86878B] font-medium mt-0.5">$0.31</span>
                    </div>
                    <div onclick="openKeypad()" class="coin-card bg-white h-[80px] rounded-xl flex flex-col items-center justify-center border-2 border-transparent shadow-sm cursor-pointer transition-all">
                        <span class="font-extrabold text-[17px] text-[#161823]">Custom</span>
                    </div>
                </div>
            </div>

            </main>

        <div class="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-100 p-4 shadow-[0_-10px_25px_rgba(0,0,0,0.04)] z-30">
            <button class="w-full h-[52px] bg-[#FE2C55] text-white rounded-[4px] font-extrabold text-[16px] flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Buy for <span id="price-display">$0.00</span>
            </button>
        </div>
    </div>

    <div id="keypad-modal-overlay" class="fixed inset-0 bg-black/50 z-50 hidden transition-opacity duration-300 opacity-0" onclick="closeKeypad()"></div>
    
    <div id="keypad-modal" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white rounded-t-3xl z-50 p-6 space-y-6 shadow-2xl no-scrollbar overflow-y-auto max-h-[90vh]">
        <div class="flex items-center justify-between">
            <button onclick="closeKeypad()" class="text-lg font-medium text-[#161823]">Cancel</button>
            <h3 class="text-xl font-extrabold text-[#161823]">Custom</h3>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#A7A9AC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>

        <div class="space-y-3">
            <h2 class="text-[15px] font-bold text-[#575B67]">Number of Coins</h2>
            <div class="bg-gray-100 rounded-xl p-4 flex items-center gap-3 border border-gray-200">
                <div class="w-8 h-8 bg-black rounded-full flex items-center justify-center">
                    <svg viewBox="0 0 24 24" class="w-4 h-4 fill-white" xmlns="http://www.w3.org/2000/svg"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.59-.98v7.37c0 1.12-.22 2.21-.66 3.21-.43 1.01-1.07 1.88-1.91 2.52a6.974 6.974 0 0 1-5.11 1.33c-1.04-.13-2.03-.51-2.91-1.11a6.83 6.83 0 0 1-2.28-2.85 7.15 7.15 0 0 1-.36-5.02c.26-1.05.74-2.02 1.43-2.84a6.76 6.76 0 0 1 3.51-2.11c.15-.03.3-.06.45-.08v4.07c-.06.01-.12.02-.19.03-.43.08-.85.24-1.23.47a3.02 3.02 0 0 0-1.08 1.18 3.12 3.12 0 0 0-.05 2.51c.19.46.51.86.91 1.14.4.28.88.44 1.37.47.67.04 1.34-.14 1.9-.52.56-.37.95-.94 1.08-1.59.05-.24.08-.49.08-.74V.02h.01z"/></svg>
                </div>
                <input id="custom-coin-input" type="text" readonly placeholder="0" class="flex-1 outline-none text-2xl font-bold text-[#161823] bg-transparent placeholder:text-[#A7A9AC]">
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3 pt-4">
            <button onclick="keyPress('1')" class="keypad-btn">1</button>
            <button onclick="keyPress('2')" class="keypad-btn">2</button>
            <button onclick="keyPress('3')" class="keypad-btn">3</button>
            <button onclick="keyPress('4')" class="keypad-btn">4</button>
            <button onclick="keyPress('5')" class="keypad-btn">5</button>
            <button onclick="keyPress('6')" class="keypad-btn">6</button>
            <button onclick="keyPress('7')" class="keypad-btn">7</button>
            <button onclick="keyPress('8')" class="keypad-btn">8</button>
            <button onclick="keyPress('9')" class="keypad-btn">9</button>
            <div></div>
            <button onclick="keyPress('0')" class="keypad-btn">0</button>
            <button onclick="keyPress('back')" class="keypad-btn flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
        </div>

        <div class="flex items-center justify-between text-sm py-3 px-1">
            <span class="font-medium text-[#161823]">Special offer</span>
            <span class="text-[#E64223] font-semibold flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="m17 5-5-3-5 3"/><path d="m17 19-5 3-5-3"/><path d="M2 12h20"/><path d="m19 17 3-5-3-5"/><path d="m5 17-3-5 3-5"/></svg>
                Unlock 5% cash...
            </span>
        </div>

        <div class="border-t border-gray-100 pt-6 space-y-4">
            <div class="flex items-center justify-between">
                <span class="text-[17px] font-bold text-[#575B67]">Total</span>
                <span id="custom-total-display" class="text-2xl font-extrabold text-[#161823]">$0.00</span>
            </div>
            <button class="w-full h-[52px] bg-[#FE2C55] text-white rounded-[4px] font-extrabold text-[16px] flex items-center justify-center gap-2 active:scale-[0.98]">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Recharge
            </button>
        </div>
    </div>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    borderRadius: {
                        'large': '20px'
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer components {
            .keypad-btn {
                @apply bg-gray-100 active:bg-gray-200 h-16 rounded-xl text-3xl font-extrabold text-[#161823] flex items-center justify-center transition-all;
            }
        }
    </style>

    <script>
        let customCoins = "0";
        const costPerCoin = 0.01066; // approx based on original pricing

        function select(element, price, coins) {
            // Unselect all
            document.querySelectorAll('.coin-card').forEach(card => {
                card.classList.remove('selected-card', 'border-[#FBC7C7]', 'bg-[#FFF2F2]');
                card.classList.add('bg-white', 'border-transparent');
            });

            // Select clicked
            element.classList.add('selected-card', 'border-[#FBC7C7]', 'bg-[#FFF2F2]');
            element.classList.remove('bg-white', 'border-transparent');

            // Update main footer button
            document.getElementById('price-display').innerText = '$' + price.toFixed(2);
        }

        function openKeypad() {
            customCoins = "0"; // reset
            updateInputDisplays();
            document.getElementById('root').classList.add('overflow-hidden'); // stop background scroll
            document.getElementById('keypad-modal-overlay').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('keypad-modal-overlay').classList.add('opacity-100');
                document.getElementById('keypad-modal').classList.add('show');
            }, 10);
        }

        function closeKeypad() {
            document.getElementById('keypad-modal').classList.remove('show');
            document.getElementById('keypad-modal-overlay').classList.remove('opacity-100');
            setTimeout(() => {
                document.getElementById('keypad-modal-overlay').classList.add('hidden');
                document.getElementById('root').classList.remove('overflow-hidden'); // restore scroll
            }, 300);
        }

        function keyPress(key) {
            if (key === 'back') {
                if (customCoins.length > 1) {
                    customCoins = customCoins.slice(0, -1);
                } else {
                    customCoins = "0";
                }
            } else {
                if (customCoins === "0") {
                    customCoins = key;
                } else {
                    customCoins += key;
                }
            }
            updateInputDisplays();
        }

        function updateInputDisplays() {
            // Update the display field inside the modal
            document.getElementById('custom-coin-input').value = parseInt(customCoins).toLocaleString();
            
            // Calculate total for modal footer
            const total = parseInt(customCoins) * costPerCoin;
            document.getElementById('custom-total-display').innerText = '$' + total.toFixed(2);
        }
    </script>
</body>
</html>
