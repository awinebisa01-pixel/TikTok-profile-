<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Coins - Recharge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Modal Animation */
        #custom-keypad { transition: transform 0.3s ease-out; transform: translateY(100%); }
        #custom-keypad.show { transform: translateY(0%); }

        /* Processing Dots Animation */
        @keyframes pulse-red { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } }
        @keyframes pulse-teal { 0%, 100% { transform: scale(1.2); opacity: 0.7; } 50% { transform: scale(1); opacity: 1; } }
        .dot-red { animation: pulse-red 1s infinite ease-in-out; }
        .dot-teal { animation: pulse-teal 1s infinite ease-in-out; }

        /* Keypad Active State */
        .key-btn:active { background-color: #e5e7eb; }
    </style>
</head>
<body class="bg-[#F8F8F8] no-scrollbar overflow-x-hidden">

    <div id="main-screen" class="max-w-md mx-auto min-h-screen pb-40 relative bg-[#F8F8F8]">
        <header class="flex items-center justify-between p-4 bg-white sticky top-0 z-20 border-b border-gray-100">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="rotate-180"><path d="m9 18 6-6-6-6"/></svg>
            <h1 class="text-[17px] font-bold">Get Coins</h1>
            <div class="flex gap-4">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
        </header>

        <main class="p-4 space-y-4">
            <div class="bg-white rounded-2xl p-4 flex items-center gap-4 shadow-sm border border-gray-100">
                <div class="w-10 h-10 bg-black rounded-full flex items-center justify-center overflow-hidden">
                    <svg viewBox="0 0 24 24" class="w-6 h-6 fill-white"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.59-.98v7.37c0 1.12-.22 2.21-.66 3.21-.43 1.01-1.07 1.88-1.91 2.52a6.974 6.974 0 0 1-5.11 1.33c-1.04-.13-2.03-.51-2.91-1.11a6.83 6.83 0 0 1-2.28-2.85 7.15 7.15 0 0 1-.36-5.02c.26-1.05.74-2.02 1.43-2.84a6.76 6.76 0 0 1 3.51-2.11c.15-.03.3-.06.45-.08v4.07c-.06.01-.12.02-.19.03-.43.08-.85.24-1.23.47a3.02 3.02 0 0 0-1.08 1.18 3.12 3.12 0 0 0-.05 2.51c.19.46.51.86.91 1.14.4.28.88.44 1.37.47.67.04 1.34-.14 1.9-.52.56-.37.95-.94 1.08-1.59.05-.24.08-.49.08-.74V.02h.01z"/></svg>
                </div>
                <input type="text" placeholder="Enter username" class="flex-1 outline-none font-medium">
            </div>

            <div class="space-y-3">
                <h2 class="text-sm font-bold text-gray-500">Recharge</h2>
                <div class="grid grid-cols-3 gap-2">
                    <div onclick="selectAmount(this, 0.31)" class="bg-white p-4 rounded-xl flex flex-col items-center justify-center border-2 border-transparent shadow-sm cursor-pointer">
                        <span class="font-bold text-lg">30</span>
                        <span class="text-xs text-gray-400">$0.31</span>
                    </div>
                    <div onclick="openKeypad()" class="bg-white p-4 rounded-xl flex flex-col items-center justify-center border-2 border-transparent shadow-sm cursor-pointer">
                        <span class="font-bold text-lg">Custom</span>
                    </div>
                </div>
            </div>
        </main>

        <div class="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-100 p-4 z-10">
            <button onclick="startProcessing()" class="w-full h-[52px] bg-[#FE2C55] text-white rounded-md font-extrabold flex items-center justify-center gap-2">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Buy for <span id="price-display">$0.31</span>
            </button>
        </div>
    </div>

    <div id="keypad-overlay" class="fixed inset-0 bg-black/50 z-[40] hidden opacity-0 transition-opacity" onclick="closeKeypad()"></div>
    <div id="custom-keypad" class="fixed bottom-0 w-full max-w-md bg-white rounded-t-[24px] z-[50] p-6 space-y-6">
        <div class="flex items-center justify-between">
            <button onclick="closeKeypad()" class="text-gray-600 font-bold">Cancel</button>
            <h3 class="text-xl font-extrabold">Custom</h3>
            <div class="w-6 h-6 border-2 border-gray-300 rounded-full flex items-center justify-center text-xs text-gray-400 font-bold">?</div>
        </div>

        <div class="space-y-2">
            <p class="text-xs font-bold text-gray-400">Number of Coins</p>
            <div class="bg-gray-100 rounded-xl p-4 flex items-center gap-3">
                <div class="w-8 h-8 bg-black rounded-full flex items-center justify-center">
                    <svg viewBox="0 0 24 24" class="w-4 h-4 fill-white"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.59-.98v7.37c0 1.12-.22 2.21-.66 3.21-.43 1.01-1.07 1.88-1.91 2.52a6.974 6.974 0 0 1-5.11 1.33c-1.04-.13-2.03-.51-2.91-1.11a6.83 6.83 0 0 1-2.28-2.85 7.15 7.15 0 0 1-.36-5.02c.26-1.05.74-2.02 1.43-2.84a6.76 6.76 0 0 1 3.51-2.11c.15-.03.3-.06.45-.08v4.07c-.06.01-.12.02-.19.03-.43.08-.85.24-1.23.47a3.02 3.02 0 0 0-1.08 1.18 3.12 3.12 0 0 0-.05 2.51c.19.46.51.86.91 1.14.4.28.88.44 1.37.47.67.04 1.34-.14 1.9-.52.56-.37.95-.94 1.08-1.59.05-.24.08-.49.08-.74V.02h.01z"/></svg>
                </div>
                <input id="keypad-input" type="text" readonly value="0" class="bg-transparent text-2xl font-bold w-full outline-none">
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <button onclick="pressKey(1)" class="key-btn h-14 bg-gray-100 rounded-xl text-2xl font-bold">1</button>
            <button onclick="pressKey(2)" class="key-btn h-14 bg-gray-100 rounded-xl text-2xl font-bold">2</button>
            <button onclick="pressKey(3)" class="key-btn h-14 bg-gray-100 rounded-xl text-2xl font-bold">3</button>
            <button onclick="pressKey(4)" class="key-btn h-14 bg-gray-100 rounded-xl text-2xl font-bold">4</button>
            <button onclick="pressKey(5)" class="key-btn h-14 bg-gray-100 rounded-xl text-2xl font-bold">5</button>
            <button onclick="pressKey(6)" class="key-btn h-14 bg-gray-100 rounded-xl text-2xl font-bold">6</button>
            <button onclick="pressKey(7)" class="key-btn h-14 bg-gray-100 rounded-xl text-2xl font-bold">7</button>
            <button onclick="pressKey(8)" class="key-btn h-14 bg-gray-100 rounded-xl text-2xl font-bold">8</button>
            <button onclick="pressKey(9)" class="key-btn h-14 bg-gray-100 rounded-xl text-2xl font-bold">9</button>
            <div></div><button onclick="pressKey(0)" class="key-btn h-14 bg-gray-100 rounded-xl text-2xl font-bold">0</button>
            <button onclick="pressKey('back')" class="key-btn h-14 bg-gray-100 rounded-xl flex items-center justify-center font-bold">←</button>
        </div>

        <div class="pt-4 border-t border-gray-100 flex justify-between items-center">
            <span class="text-gray-400 font-bold">Total</span>
            <span id="keypad-total" class="text-2xl font-extrabold text-[#161823]">$0.00</span>
        </div>
        <button onclick="startProcessing()" class="w-full h-[52px] bg-[#FE2C55] text-white rounded-md font-extrabold">Recharge</button>
    </div>

    <div id="status-overlay" class="fixed inset-0 bg-black/40 z-[100] hidden items-center justify-center p-8 backdrop-blur-sm">
        <div id="processing-box" class="bg-white w-full max-w-[280px] rounded-[32px] p-8 flex flex-col items-center space-y-6 shadow-2xl">
            <div class="flex gap-2">
                <div class="w-4 h-4 bg-[#FE2C55] rounded-full dot-red"></div>
                <div class="w-4 h-4 bg-[#2AF0EA] rounded-full dot-teal"></div>
            </div>
            <div class="text-center"><h3 class="font-bold text-[17px]">Processing your payment</h3><p class="text-xs text-gray-400 mt-1">This could take a few seconds</p></div>
            <div class="text-gray-300 font-bold text-[15px]">04:59</div>
        </div>

        <div id="success-box" class="hidden bg-white w-full max-w-[280px] rounded-[32px] p-8 flex flex-col items-center space-y-6 shadow-2xl">
            <div class="w-16 h-16 bg-[#25C059] rounded-full flex items-center justify-center">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4"><path d="M20 6L9 17l-5-5"/></svg>
            </div>
            <h3 class="text-xl font-extrabold">Payment done</h3>
            <button onclick="location.reload()" class="w-full py-3 bg-gray-100 rounded-xl font-bold">Done</button>
        </div>
    </div>

    <script>
        let inputCoins = "0";

        function selectAmount(el, price) {
            document.querySelectorAll('.grid div').forEach(d => d.style.borderColor = 'transparent');
            el.style.borderColor = '#FE2C55';
            document.getElementById('price-display').innerText = '$' + price;
        }

        function openKeypad() {
            document.getElementById('keypad-overlay').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('keypad-overlay').classList.add('opacity-100');
                document.getElementById('custom-keypad').classList.add('show');
            }, 10);
        }

        function closeKeypad() {
            document.getElementById('custom-keypad').classList.remove('show');
            document.getElementById('keypad-overlay').classList.remove('opacity-100');
            setTimeout(() => document.getElementById('keypad-overlay').classList.add('hidden'), 300);
        }

        function pressKey(k) {
            if (k === 'back') {
                inputCoins = inputCoins.length > 1 ? inputCoins.slice(0, -1) : "0";
            } else {
                inputCoins = inputCoins === "0" ? String(k) : inputCoins + k;
            }
            document.getElementById('keypad-input').value = inputCoins;
            let total = (parseInt(inputCoins) * 0.0104).toFixed(2);
            document.getElementById('keypad-total').innerText = '$' + total;
            document.getElementById('price-display').innerText = '$' + total;
        }

        function startProcessing() {
            closeKeypad();
            const overlay = document.getElementById('status-overlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            
            setTimeout(() => {
                document.getElementById('processing-box').classList.add('hidden');
                document.getElementById('success-box').classList.remove('hidden');
            }, 3500);
        }
    </script>
</body>
</html>
