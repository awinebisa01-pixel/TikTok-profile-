<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Coins UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .coin-icon { width: 18px; height: 18px; margin-right: 4px; }
        .modal-overlay { background: rgba(0,0,0,0.5); display: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <div class="max-w-md mx-auto min-h-screen bg-white shadow-lg flex flex-col">
        
        <header class="p-4 flex justify-between items-center border-b">
            <span class="text-lg font-bold">Get Coins</span>
            <div class="flex gap-4">
                <span class="text-xl">...</span>
                <div class="w-8 h-8 bg-gray-200 rounded-full"></div>
            </div>
        </header>

        <main class="p-4 flex-grow">
            <div class="flex items-center mb-6">
                <img src="https://www.edigitalagency.com.au/wp-content/uploads/TikTok-logo-png.png" class="w-8 h-8 mr-2" alt="TikTok">
                <input type="text" placeholder="Enter username" class="w-full bg-gray-100 p-2 rounded-md outline-none">
            </div>

            <p class="text-red-500 text-sm font-semibold mb-1">Save around 25% with a lower third-party service fee.</p>
            <p class="text-gray-400 text-xs mb-4">Recharge</p>

            <div class="grid grid-cols-3 gap-3">
                <button onclick="selectPackage(30, 0.31)" class="border rounded-lg p-4 flex flex-col items-center hover:border-red-400 active:bg-red-50">
                    <div class="flex items-center text-sm font-bold">🟡 30</div>
                    <div class="text-gray-500 text-xs">$0.31</div>
                </button>
                <button onclick="selectPackage(350, 3.65)" class="border rounded-lg p-4 flex flex-col items-center hover:border-red-400">
                    <div class="flex items-center text-sm font-bold">🟡 350</div>
                    <div class="text-gray-500 text-xs">$3.65</div>
                </button>
                <button onclick="selectPackage(700, 7.25)" class="border rounded-lg p-4 flex flex-col items-center hover:border-red-400">
                    <div class="flex items-center text-sm font-bold">🟡 700</div>
                    <div class="text-gray-500 text-xs">$7.25</div>
                </button>
                <button onclick="openCustom()" class="border rounded-lg p-4 flex flex-col justify-center items-center font-semibold text-gray-700 hover:border-red-400">
                    Custom
                </button>
            </div>
        </main>

        <footer class="p-4 border-t bg-white">
            <div class="flex gap-2 justify-center mb-4 opacity-50">
                <span class="text-xs font-bold italic">VISA</span>
                <span class="text-xs font-bold italic">MasterCard</span>
            </div>
            <button id="buyBtn" class="w-full bg-red-500 text-white font-bold py-3 rounded-sm">
                Buy for $0.00
            </button>
        </footer>
    </div>

    <div id="customModal" class="modal-overlay fixed inset-0 flex items-center justify-center p-6">
        <div class="bg-white rounded-xl p-6 w-full max-w-xs shadow-2xl">
            <h3 class="text-lg font-bold mb-4">Custom Coins</h3>
            <input id="customInput" type="number" placeholder="Enter amount (min 30)" class="w-full border p-3 rounded-lg mb-4 outline-none focus:border-red-500">
            <button onclick="processCustom()" class="w-full bg-black text-white py-3 rounded-lg font-bold">Continue</button>
            <button onclick="closeModal()" class="w-full text-gray-500 mt-2 text-sm">Cancel</button>
        </div>
    </div>

    <div id="processingModal" class="modal-overlay fixed inset-0 flex items-center justify-center p-6">
        <div class="bg-white rounded-xl p-8 w-full max-w-xs text-center">
            <div id="spinner" class="animate-spin rounded-full h-12 w-12 border-b-2 border-red-500 mx-auto mb-4"></div>
            <h3 id="processText" class="text-lg font-bold">Processing Payment...</h3>
            <div id="details" class="hidden text-left mt-4 text-sm bg-gray-50 p-4 rounded">
                <p><strong>Order ID:</strong> #TK-8829</p>
                <p><strong>Amount:</strong> <span id="finalAmt"></span> Coins</p>
                <p class="mt-2 text-green-600 font-bold">Success! Coins added to your account.</p>
                <button onclick="location.reload()" class="mt-4 w-full bg-red-500 text-white py-2 rounded">Close</button>
            </div>
        </div>
    </div>

    <script>
        function selectPackage(coins, price) {
            document.getElementById('buyBtn').innerText = `Buy for $${price}`;
        }

        function openCustom() {
            document.getElementById('customModal').style.display = 'flex';
        }

        function closeModal() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
        }

        function processCustom() {
            const amount = document.getElementById('customInput').value;
            if (amount < 30) {
                alert("Minimum 30 coins required.");
                return;
            }
            
            closeModal();
            document.getElementById('processingModal').style.display = 'flex';

            // Simulate Processing
            setTimeout(() => {
                document.getElementById('spinner').classList.add('hidden');
                document.getElementById('processText').innerText = "Payment Details";
                document.getElementById('details').classList.remove('hidden');
                document.getElementById('finalAmt').innerText = amount;
            }, 2000);
        }
    </script>
</body>
</html>
